version: '3.9'

services:

  mysql:
    image: mysql:5.7
    container_name: mysql_microservicios
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microservicios_db

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  usuario-service:
    build: ./usuario-service
    container_name: usuario_service
    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  pedido-service:
    build: ./pedido-service
    container_name: pedido_service
    restart: always

    ports:
      - "5001:5001"

    depends_on:
      - mysql
      - usuario-service